<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Kinh Thánh Số Hóa - 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-brown: #5c4033; --accent-gold: #ffa000; --bg-paper: #fffdf5; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #map { height: 100vh; width: 100%; z-index: 1; }

        /* HIỆU ỨNG BẢN ĐỒ CỔ */
        .sepia-map { 
            filter: sepia(0.6) contrast(1.1) brightness(0.9) hue-rotate(-10deg) !important; 
        }

        /* BẢNG ĐIỀU KHIỂN */
        .control-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 280px;
            border: 2px solid var(--primary-brown);
            max-height: 90vh; overflow-y: auto;
        }

        @media (max-width: 600px) {
            .control-panel {
                width: calc(100% - 40px);
                top: auto; bottom: 20px; left: 10px;
                max-height: 45vh;
            }
        }

        h3 { margin: 0 0 10px 0; color: var(--primary-brown); text-align: center; font-size: 1.1em; }
        select, button { width: 100%; margin-top: 8px; padding: 12px; border-radius: 8px; border: 1px solid var(--primary-brown); font-size: 14px; }
        button { background: var(--primary-brown); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        #bibleContent { 
            margin-top: 15px; padding: 15px; background: var(--bg-paper); 
            border: 1px solid #d4a373; display: none; border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            line-height: 1.6; 
            max-height: 400px; 
            overflow-y: auto; 
        }

        /* FIX: Hiệu ứng nhấp nháy tại chỗ mạnh hơn để dễ nhận diện */
        @keyframes pulse-marker {
            0% { 
                stroke-width: 2; 
                stroke-opacity: 1; 
            }
            50% { 
                stroke-width: 25; /* Tăng độ dày viền lớn hơn để tạo quầng lan tỏa */
                stroke-opacity: 0.4; 
            }
            100% { 
                stroke-width: 2; 
                stroke-opacity: 1; 
            }
        }

        .active-marker {
            animation: pulse-marker 1s infinite ease-in-out; /* Tốc độ nhanh hơn một chút để gây chú ý */
            stroke: #ff5722 !important; 
            fill-opacity: 1 !important;
            z-index: 1000 !important; /* Đảm bảo điểm đang chọn luôn nằm trên cùng */
        }

        /* Style cho danh sách lộ trình */
        .path-step {
            padding: 8px;
            margin: 5px 0;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
        }
        .path-step:hover { background: #fdf5e6; border-color: var(--accent-gold); }

        .location-label {
            background: rgba(255, 255, 255, 0.9); border: 1px solid var(--primary-brown);
            border-radius: 4px; padding: 2px 6px; font-weight: bold;
            color: var(--primary-brown); font-size: 10px; white-space: nowrap;
        }

        .sepia-map-active .location-label {
            background: rgba(92, 64, 51, 0.9) !important;
            color: #f5ebe0 !important;
            border: 1px solid #d4a373 !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>HÀNH TRÌNH ĐỨC TIN</h3>
        <select id="bookSelect"><option value="">-- Tải dữ liệu... --</option></select>
        <select id="chapterSelect" disabled><option value="">-- Chọn chặng đường --</option></select>
        <button id="viewJourney">XEM HÀNH TRÌNH</button>
        <div id="bibleContent"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>

    <script>
        const hienDai = L.tileLayer('https://mt1.google.com/vt/lyrs=y&hl=vi&x={x}&y={y}&z={z}', {
            attribution: 'Google Maps Hiện đại'
        });

        const coXua = L.tileLayer('https://mt1.google.com/vt/lyrs=s&hl=vi&x={x}&y={y}&z={z}', {
            attribution: 'Bản đồ Cổ phong',
            className: 'sepia-map'
        });

        const map = L.map('map', {
            center: [32.0, 35.0],
            zoom: 6,
            layers: [hienDai],
            zoomControl: false
        });

        L.control.layers({
            "Bản đồ Hiện đại (Đầy đủ)": hienDai,
            "Bản đồ Cổ (Địa danh Kinh Thánh)": coXua
        }, null, { position: 'topleft' }).addTo(map);

        let bibleData = {};
        let currentLayer = L.layerGroup().addTo(map);

        map.on('baselayerchange', function(e) {
            const mapContainer = document.getElementById('map');
            if (e.name === "Bản đồ Cổ (Địa danh Kinh Thánh)") {
                mapContainer.classList.add('sepia-map-active');
            } else {
                mapContainer.classList.remove('sepia-map-active');
            }
        });

        async function loadData() {
            try {
                const response = await fetch('data.json');
                bibleData = await response.json();
                const bookSelect = document.getElementById('bookSelect');
                bookSelect.innerHTML = '<option value="">-- Chọn Sách --</option>';
                for (let book in bibleData) {
                    bookSelect.add(new Option(book.replace(/_/g, ' ').toUpperCase(), book));
                }
            } catch (e) { console.error("Lỗi nạp JSON:", e); }
        }

        document.getElementById('bookSelect').onchange = function() {
            const chapterSelect = document.getElementById('chapterSelect');
            chapterSelect.innerHTML = '<option value="">-- Chọn chặng đường --</option>';
            if (this.value) {
                chapterSelect.disabled = false;
                bibleData[this.value].forEach((item, index) => chapterSelect.add(new Option(item.title, index)));
            }
        };

        document.getElementById('viewJourney').onclick = function() {
            const book = document.getElementById('bookSelect').value;
            const index = document.getElementById('chapterSelect').value;
            if (!book || index === "") return;

            const data = bibleData[book][index];
            currentLayer.clearLayers();
            const bibleContent = document.getElementById('bibleContent');
            const markers = []; 

            bibleContent.style.display = 'block';
            let stepsHtml = data.points.map((p, i) => 
                `<div class="path-step" onclick="focusPoint(${i})"><strong>${i+1}.</strong> ${p.name}</div>`
            ).join('');

            bibleContent.innerHTML = `
                <div style="border-bottom: 2px solid var(--primary-brown); margin-bottom: 10px; padding-bottom: 5px;">
                    <strong style="color: var(--primary-brown);">${data.title}</strong>
                </div>
                <div style="font-size: 0.85em;">
                    <p style="margin:5px 0">📍 <strong>Lộ trình:</strong></p>
                    <div style="margin-bottom:10px">${stepsHtml}</div>
                    <div style="background: #efebe9; padding: 8px; border-radius: 5px;">
                        📏 ${data.stats?.distance || "N/A"} | ⏳ ${data.stats?.time || "N/A"}
                    </div>
                </div>
            `;

            data.points.forEach((p, i) => {
                const marker = L.circleMarker(p.coord, { 
                    radius: 8, color: 'white', weight: 2, fillColor: '#d84315', fillOpacity: 1
                }).addTo(currentLayer);

                marker.bindTooltip(p.name, { 
                    permanent: true, direction: 'top', className: 'location-label', offset: [0, -10] 
                });

                markers.push(marker);
                marker.on('click', function() { focusPoint(i); });
            });

            window.focusPoint = function(idx) {
                const p = data.points[idx];
                const targetMarker = markers[idx];

                markers.forEach(m => {
                    if (m._path) L.DomUtil.removeClass(m._path, 'active-marker');
                });
                
                if (targetMarker._path) L.DomUtil.addClass(targetMarker._path, 'active-marker');

                map.panTo(p.coord);

                const detailHtml = `
                    <div style="animation: fadeIn 0.3s;">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d4a373; margin-bottom: 10px;">
                            <h4 style="color:#d84315; margin: 0;">📍 ${p.name}</h4>
                            <button onclick="document.getElementById('viewJourney').click()" style="background:none; border:none; cursor:pointer; font-size: 14px; color:#d84315;">↩ Quay lại</button>
                        </div>
                        <div style="font-size: 0.92em; margin: 10px 0; color: #333;">${p.note}</div>
                        <div style="background:#fdf5e6; border-left: 4px solid var(--accent-gold); padding: 10px; font-size: 0.85em; border-radius: 4px;">
                            📖 <strong>Kinh Thánh:</strong> ${p.scripture}
                        </div>
                    </div>
                `;
                bibleContent.innerHTML = detailHtml;
                bibleContent.scrollTop = 0;
            };

            const coords = data.points.map(p => p.coord);
            const path = new L.Polyline.AntPath(coords, { delay: 1000, weight: 4, color: "#d84315" });
            path.addTo(currentLayer);
            map.fitBounds(path.getBounds(), { padding: [50, 50] });
        };

        loadData();
    </script>
</body>
</html>
